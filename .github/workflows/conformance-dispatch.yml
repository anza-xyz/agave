name: Conformance Dispatch

on:
  push:
    branches:
      - master
      - v[0-9]+.[0-9]+
  pull_request:
    branches:
      - master
      - v[0-9]+.[0-9]+
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "ci/conformance-table.sh"
      - ".github/workflows/conformance-dispatch.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: detect affected fixture sets
    if: github.repository_owner == 'anza-xyz'
    runs-on: ubuntu-24.04
    outputs:
      entries: ${{ steps.table.outputs.entries }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Set commit range
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "COMMIT_RANGE=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            echo "COMMIT_RANGE=${{ github.event.before }}..$GITHUB_SHA" >> "$GITHUB_ENV"
          fi

      - name: Setup Rust
        shell: bash
        run: |
          source ci/rust-version.sh stable
          rustup default "$rust_stable"

      - id: table
        name: Build conformance table
        shell: bash
        run: echo "entries=$(ci/conformance-table.sh)" >> "$GITHUB_OUTPUT"

  run:
    name: "stub: ${{ matrix.entry.harness }}"
    needs: detect
    if: needs.detect.outputs.entries != '[]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        entry: ${{ fromJSON(needs.detect.outputs.entries) }}
    steps:
      - name: Log (stub)
        run: |
          echo "stub: would run harness '${{ matrix.entry.harness }}' on fixtures '${{ matrix.entry.fixtures_dir }}'"
          echo "No fixtures downloaded or executed yet."
