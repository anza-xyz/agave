name: Conformance Dispatch

on:
  push:
    branches:
      - master
      - v[0-9]+.[0-9]+
  pull_request:
    branches:
      - master
      - v[0-9]+.[0-9]+
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "ci/conformance-dispatch.sh"
      - ".github/workflows/conformance-dispatch.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    name: dispatch conformance fixtures (stub)
    if: github.repository_owner == 'anza-xyz'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Get commit range (push)
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "COMMIT_RANGE=${{ github.event.before }}..$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Get commit range (pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "COMMIT_RANGE=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"

      - name: Setup Rust
        shell: bash
        run: |
          source ci/rust-version.sh stable
          rustup default "$rust_stable"

      - name: Dispatch conformance fixtures
        shell: bash
        run: |
          ci/conformance-dispatch.sh
