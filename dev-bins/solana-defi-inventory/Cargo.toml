[package]
name = "solana-defi-inventory"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[[bin]]
name = "solana-defi-inventory"
path = "src/main.rs"

[dependencies]
solana-commitment-config = "3.1.1"
solana-pubkey = "4.2.0"
solana-rpc-client = { path = "../../rpc-client", default-features = false }

# This crate intentionally has no signing/keypair/transaction-sending dependencies.
# It performs read-only HTTP/RPC inventory and audit-target generation only.
